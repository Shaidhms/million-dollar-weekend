<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Million Dollar Weekend - Challenge Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1a1a1a;
            --card-done: #0d1f12;
            --border: #2a2a2a;
            --border-done: #1a3a1a;
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #f5c542;
            --accent-dim: #b8941f;
            --green: #4ade80;
            --green-dim: #166534;
            --tag-bg: #222;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .header .author-line {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .header .author-line strong {
            color: var(--text);
        }

        /* Progress */
        .progress-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
        }

        .progress-header h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .progress-stats {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .progress-stats .done-count {
            color: var(--green);
        }

        .progress-stats .total-count {
            color: var(--text-muted);
            font-weight: 400;
        }

        .progress-bar-track {
            width: 100%;
            height: 10px;
            background: var(--card);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green-dim), var(--green));
            border-radius: 5px;
            transition: width 0.6s ease;
        }

        .progress-message {
            margin-top: 0.6rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Filter */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: var(--accent-dim); color: var(--text); }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

        /* Task Cards */
        .tasks-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            border-color: var(--accent-dim);
            transform: translateY(-1px);
        }

        .task-card.done {
            background: var(--card-done);
            border-color: var(--border-done);
        }

        .task-card.done:hover {
            border-color: var(--green-dim);
        }

        .task-main {
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .task-number {
            flex-shrink: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .task-card.done .task-number {
            background: var(--green-dim);
            border-color: var(--green);
            color: var(--green);
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .task-card.done .task-title {
            color: var(--green);
        }

        .task-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }

        .task-chapter {
            font-size: 0.7rem;
            background: var(--tag-bg);
            color: var(--text-muted);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
        }

        .task-status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
        }

        .task-status-badge.pending {
            background: #2a2000;
            color: var(--accent);
        }

        .task-status-badge.completed {
            background: var(--green-dim);
            color: var(--green);
        }

        .task-toggle-icon {
            flex-shrink: 0;
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: transform 0.3s;
            align-self: center;
        }

        .task-card.expanded .task-toggle-icon {
            transform: rotate(180deg);
        }

        /* Expandable proof section */
        .task-proof {
            display: none;
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
            margin-top: 0;
        }

        .task-card.expanded .task-proof {
            display: block;
        }

        .proof-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .proof-comment {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-line;
        }

        .proof-images {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .proof-images img {
            max-width: 280px;
            width: 100%;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .proof-images img:hover {
            transform: scale(1.02);
        }

        .proof-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
        }

        .no-proof {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-style: italic;
            padding-top: 1rem;
        }

        /* Script block */
        .script-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 0.5rem;
            position: relative;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-line;
            user-select: text;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.3rem 0.7rem;
            border-radius: 0.35rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover { color: var(--text); border-color: var(--accent-dim); }
        .copy-btn.copied { color: var(--green); border-color: var(--green-dim); }

        /* Mark done button */
        .mark-done-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        .mark-done-btn:hover { border-color: var(--accent); }

        .task-card.done .mark-done-btn {
            color: var(--green);
            border-color: var(--green-dim);
        }

        .task-card.done .mark-done-btn:hover { border-color: var(--green); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 0.5rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .footer .footer-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .footer .footer-name a {
            color: var(--accent);
            text-decoration: none;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.4rem 0.85rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .social-link:hover {
            border-color: var(--accent-dim);
            color: var(--text);
        }

        .social-link svg {
            width: 14px;
            height: 14px;
        }

        /* Chapter headers */
        .chapter-header {
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .chapter-header:first-child { margin-top: 0; }

        .chapter-part {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-dim);
            margin-bottom: 0.15rem;
        }

        .chapter-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .chapter-progress {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* Book reference images */
        .book-ref-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-dim);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .book-ref-label:hover { color: var(--accent); }

        .book-ref-toggle {
            font-size: 0.7rem;
            transition: transform 0.3s;
        }

        .book-ref-images {
            display: none;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.25rem;
        }

        .book-ref-images.open {
            display: flex;
        }

        .book-ref-images img {
            max-width: 300px;
            width: 100%;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .book-ref-images img:hover {
            transform: scale(1.02);
            border-color: var(--accent-dim);
        }

        /* Key insight */
        .key-insight {
            font-size: 0.8rem;
            color: var(--accent);
            background: rgba(245, 197, 66, 0.08);
            border-left: 2px solid var(--accent-dim);
            padding: 0.5rem 0.75rem;
            margin-top: 0.5rem;
            border-radius: 0 0.25rem 0.25rem 0;
            line-height: 1.5;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .container { padding: 1.25rem 1rem 3rem; }
            .header h1 { font-size: 1.5rem; }
            .task-main { padding: 1rem; gap: 0.75rem; }
            .task-proof { padding: 0 1rem 1rem; }
            .proof-images img { max-width: 100%; }
            .progress-stats { font-size: 1.25rem; }
        }
    </style>
</head>

    // ================================================================
    // LOCALSTORAGE - persist done state in browser
    // ================================================================

    const STORAGE_KEY = 'mdw_tasks_done';

    function loadDoneState() {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            tasks.forEach(t => {
                if (saved[t.id]) t.done = true;
            });
        } catch(e) {}
    }

    function saveDoneState() {
        const state = {};
        tasks.forEach(t => { if (t.done) state[t.id] = true; });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function toggleDone(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.done = !task.done;
            saveDoneState();
            const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
            renderTasks(activeFilter);
        }
    }

    // ================================================================
    // COPY SCRIPT
    // ================================================================

    function copyScript(id) {
        const task = tasks.find(t => t.id === id);
        if (!task || !task.script) return;
        navigator.clipboard.writeText(task.script).then(() => {
            const btn = document.querySelector(`.copy-btn[data-id="${id}"]`);
            if (btn) {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            }
        });
    }

    // ================================================================
    // RENDERING
    // ================================================================

    const grid = document.getElementById('tasksGrid');
    const doneCountEl = document.getElementById('doneCount');
    const totalCountEl = document.getElementById('totalCount');
    const progressBar = document.getElementById('progressBar');
    const progressMsg = document.getElementById('progressMessage');

    function getProgressMessage(done, total) {
        if (total === 0) return "Send me the book task photos to get started!";
        const pct = Math.round((done / total) * 100);
        if (pct === 0) return "Time to start. Pick one and go.";
        if (pct < 25) return "You've started. Keep the momentum going.";
        if (pct < 50) return "Making progress. Stay consistent.";
        if (pct < 75) return "Past the halfway mark. You're doing this.";
        if (pct < 100) return "Almost there. Finish strong.";
        return "All challenges done. Ship it.";
    }

    function renderTasks(filter = 'all') {
        const done = tasks.filter(t => t.done).length;
        const total = tasks.length;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;

        doneCountEl.textContent = done;
        totalCountEl.textContent = total;
        progressBar.style.width = pct + '%';
        progressMsg.textContent = getProgressMessage(done, total);

        let filtered = tasks;
        if (filter === 'done') filtered = tasks.filter(t => t.done);
        if (filter === 'pending') filtered = tasks.filter(t => !t.done);

        if (filtered.length === 0 && total > 0) {
            grid.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">No tasks in this category.</p>';
            return;
        }

        if (total === 0) {
            grid.innerHTML = `
                <div style="text-align: center; padding: 3rem 1rem; color: var(--text-muted);">
                    <p style="font-size: 2rem; margin-bottom: 0.5rem;">📖</p>
                    <p style="font-size: 1rem;">No challenges added yet.</p>
                    <p style="font-size: 0.85rem; margin-top: 0.3rem;">Send photos of the book tasks to populate this tracker.</p>
                </div>`;
            return;
        }

        // Group tasks by chapter
        let html = '';
        let lastChapter = '';

        filtered.forEach(task => {
            const ch = chapters.find(c => c.key === task.chapter);
            if (ch && task.chapter !== lastChapter) {
                const chapterTasks = filtered.filter(t => t.chapter === task.chapter);
                const chapterDone = chapterTasks.filter(t => t.done).length;
                html += `
                    <div class="chapter-header">
                        <div class="chapter-part">${ch.part}</div>
                        <div class="chapter-name">${ch.name}</div>
                        <div class="chapter-progress">${chapterDone}/${chapterTasks.length} completed</div>
                    </div>`;
                lastChapter = task.chapter;
            }

            html += `
            <div class="task-card ${task.done ? 'done' : ''}" data-id="${task.id}">
                <div class="task-main" onclick="toggleCard(${task.id})">
                    <div class="task-number">${task.done ? '&#10003;' : task.id}</div>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-desc">${task.description}</div>
                        <div class="task-meta">
                            <span class="task-chapter">${ch ? ch.name.split(': ')[1] : task.chapter}</span>
                            <span class="task-status-badge ${task.done ? 'completed' : 'pending'}">${task.done ? 'Completed' : 'Pending'}</span>
                        </div>
                    </div>
                    <div class="task-toggle-icon">&#9662;</div>
                </div>
                <div class="task-proof">
                    ${task.insight ? `<div class="key-insight">${task.insight}</div>` : ''}
                    ${task.bookImages && task.bookImages.length > 0 ? `
                        <div class="book-ref-label" onclick="event.stopPropagation(); toggleBookRef(${task.id})">
                            <span class="book-ref-toggle" id="bookToggle${task.id}">&#9662;</span>
                            Book Reference (${task.bookImages.length} page${task.bookImages.length > 1 ? 's' : ''})
                        </div>
                        <div class="book-ref-images" id="bookRef${task.id}">
                            ${task.bookImages.map(img => `<img src="${img}" alt="Book page" onclick="event.stopPropagation(); openLightbox('${img}')">`).join('')}
                        </div>
                    ` : ''}
                    ${task.script ? `
                        <div class="proof-label">Script to send</div>
                        <div class="script-block">
                            <button class="copy-btn" data-id="${task.id}" onclick="event.stopPropagation(); copyScript(${task.id})">Copy</button>
                            ${task.script}
                        </div>
                    ` : ''}
                    ${task.proof ? `
                        ${task.proof.comment ? `<div class="proof-label">What happened</div><div class="proof-comment">${task.proof.comment}</div>` : ''}
                        ${task.proof.images && task.proof.images.length > 0 ? `
                            <div class="proof-label">Proof</div>
                            <div class="proof-images">
                                ${task.proof.images.map(img => `<img src="${img}" alt="Proof" onclick="event.stopPropagation(); openLightbox('${img}')">`).join('')}
                            </div>
                        ` : ''}
                        ${task.proof.date ? `<div class="proof-date">Completed: ${task.proof.date}</div>` : ''}
                    ` : ''}
                    <button class="mark-done-btn" onclick="event.stopPropagation(); toggleDone(${task.id})">
                        ${task.done ? '&#10003; Completed' : '&#9675; Mark as Done'}
                    </button>
                </div>
            </div>`;
        });

        grid.innerHTML = html;
    }

    function toggleCard(id) {
        const card = document.querySelector(`.task-card[data-id="${id}"]`);
        if (card) card.classList.toggle('expanded');
    }

    function toggleBookRef(id) {
        const el = document.getElementById('bookRef' + id);
        const toggle = document.getElementById('bookToggle' + id);
        if (el) {
            el.classList.toggle('open');
            if (toggle) toggle.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : '';
        }
    }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks(btn.dataset.filter);
        });
    });

    // Lightbox
    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('active');
    }

    document.getElementById('lightbox').addEventListener('click', () => {
        document.getElementById('lightbox').classList.remove('active');
    });

    // Load saved state and render
    loadDoneState();
    renderTasks();
</script>
